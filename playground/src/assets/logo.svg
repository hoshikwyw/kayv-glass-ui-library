<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 224 52">
  <defs>
    <linearGradient id="icon-bg" x1="5%" y1="0%" x2="95%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <radialGradient id="icon-accent" cx="50%" cy="100%" r="70%">
      <stop offset="0%" stop-color="#818CF8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#818CF8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="icon-sheen" cx="22%" cy="16%" r="58%">
      <stop offset="0%" stop-color="white" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="icon-clip">
      <rect x="0" y="4" width="44" height="44" rx="10"/>
    </clipPath>
  </defs>

  <!-- ── Icon mark ── -->
  <rect x="0" y="4" width="44" height="44" rx="10" fill="url(#icon-bg)"/>
  <rect x="0" y="4" width="44" height="44" rx="10" fill="url(#icon-accent)"/>

  <!-- Glass panels inside icon (clipped) -->
  <g clip-path="url(#icon-clip)">
    <rect x="3" y="19" width="34" height="22" rx="5"
          fill="white" fill-opacity="0.06"
          stroke="white" stroke-opacity="0.12" stroke-width="0.7"
          transform="rotate(-7 20 30)"/>
    <rect x="7" y="14" width="30" height="22" rx="4.5"
          fill="white" fill-opacity="0.10"
          stroke="white" stroke-opacity="0.17" stroke-width="0.7"
          transform="rotate(5 22 25)"/>
  </g>

  <!-- K in icon -->
  <line x1="13" y1="12.5" x2="13" y2="39.5"
        stroke="white" stroke-width="5.2" stroke-linecap="round"/>
  <line x1="13" y1="26" x2="33.5" y2="12.5"
        stroke="white" stroke-width="5" stroke-linecap="round" stroke-opacity="0.90"/>
  <line x1="13" y1="26" x2="33.5" y2="39.5"
        stroke="white" stroke-width="5" stroke-linecap="round" stroke-opacity="0.90"/>

  <!-- Icon sheen -->
  <rect x="0" y="4" width="44" height="44" rx="10" fill="url(#icon-sheen)"/>
  <!-- Icon border -->
  <rect x="0.5" y="4.5" width="43" height="43" rx="9.5"
        fill="none" stroke="white" stroke-opacity="0.22" stroke-width="1"/>

  <!-- ── Wordmark ── -->
  <!-- "kayv" bold -->
  <text x="54" y="24"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-weight="700" font-size="17" letter-spacing="-0.3"
        fill="#0F172A">kayv</text>
  <!-- "-glass-ui" subdued -->
  <text x="54" y="24"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-weight="400" font-size="17" letter-spacing="-0.3"
        fill="#64748B" dx="46">-glass-ui</text>

  <!-- Tagline -->
  <text x="54" y="41"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-weight="500" font-size="10.5" letter-spacing="0.04em"
        fill="#6366F1" fill-opacity="0.85">
    COMPONENT LIBRARY
  </text>
</svg>
