<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Background: indigo-600 → violet-600 diagonal -->
    <linearGradient id="bg-grad" x1="5%" y1="0%" x2="95%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>

    <!-- Subtle inner bottom accent -->
    <radialGradient id="inner-accent" cx="50%" cy="100%" r="70%">
      <stop offset="0%" stop-color="#818CF8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#818CF8" stop-opacity="0"/>
    </radialGradient>

    <!-- Top-left glass sheen -->
    <radialGradient id="sheen" cx="22%" cy="16%" r="58%">
      <stop offset="0%" stop-color="white" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>

    <!-- Drop shadow filter -->
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="6"
                    flood-color="#4F46E5" flood-opacity="0.45"/>
    </filter>

    <!-- Clip to rounded square (for glass panels) -->
    <clipPath id="bounds">
      <rect width="100" height="100" rx="22"/>
    </clipPath>
  </defs>

  <!-- Drop shadow -->
  <rect width="100" height="100" rx="22" fill="url(#bg-grad)" filter="url(#shadow)"/>

  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="url(#bg-grad)"/>

  <!-- Inner bottom accent glow -->
  <rect width="100" height="100" rx="22" fill="url(#inner-accent)"/>

  <!-- ── Glass panel layers (suggest stacked UI cards) ── -->
  <g clip-path="url(#bounds)">
    <!-- Back panel — tilted left -->
    <rect x="13" y="33" width="68" height="46" rx="10"
          fill="white" fill-opacity="0.06"
          stroke="white" stroke-opacity="0.12" stroke-width="1"
          transform="rotate(-7 47 56)"/>
    <!-- Front panel — tilted right -->
    <rect x="19" y="24" width="62" height="46" rx="9"
          fill="white" fill-opacity="0.10"
          stroke="white" stroke-opacity="0.18" stroke-width="1"
          transform="rotate(5 50 47)"/>
  </g>

  <!-- ── K lettermark ── -->
  <!-- Vertical bar -->
  <line x1="31.5" y1="21" x2="31.5" y2="79"
        stroke="white" stroke-width="12" stroke-linecap="round"/>
  <!-- Upper arm — slightly lighter for depth -->
  <line x1="31.5" y1="50" x2="71" y2="21"
        stroke="white" stroke-width="11.5" stroke-linecap="round" stroke-opacity="0.90"/>
  <!-- Lower arm -->
  <line x1="31.5" y1="50" x2="71" y2="79"
        stroke="white" stroke-width="11.5" stroke-linecap="round" stroke-opacity="0.90"/>

  <!-- ── Top-left glass sheen overlay ── -->
  <rect width="100" height="100" rx="22" fill="url(#sheen)"/>

  <!-- ── Fine edge border ── -->
  <rect x="1" y="1" width="98" height="98" rx="21"
        fill="none" stroke="white" stroke-opacity="0.22" stroke-width="1.5"/>
</svg>
