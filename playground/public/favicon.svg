<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <radialGradient id="sheen" cx="25%" cy="18%" r="60%">
      <stop offset="0%" stop-color="white" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- K — vertical bar -->
  <line x1="10.5" y1="7" x2="10.5" y2="25"
        stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <!-- K — upper arm -->
  <line x1="10.5" y1="16" x2="22.5" y2="7"
        stroke="white" stroke-width="3.2" stroke-linecap="round" stroke-opacity="0.95"/>
  <!-- K — lower arm -->
  <line x1="10.5" y1="16" x2="22.5" y2="25"
        stroke="white" stroke-width="3.2" stroke-linecap="round" stroke-opacity="0.95"/>
  <!-- Glass sheen -->
  <rect width="32" height="32" rx="7" fill="url(#sheen)"/>
  <!-- Edge border -->
  <rect x="0.75" y="0.75" width="30.5" height="30.5" rx="6.5"
        fill="none" stroke="white" stroke-opacity="0.22" stroke-width="1"/>
</svg>
